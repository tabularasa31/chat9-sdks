name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Ruff
        run: python -m ruff check chat9 tests
      - name: Pytest
        run: python -m pytest -q

  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate fixture JSON
        run: |
          python -m json.tool fixtures/generate_cases.json > /dev/null
          python -m json.tool fixtures/verify_cases.json > /dev/null
          python -m json.tool fixtures/golden_tokens.json > /dev/null
